<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/color.css">


    <title>Pokedex</title>
</head>
<body onload="getPokemon()">
    <h2>Pokedex catch em all</h2>
    <div class="search_input">
        <label for="search_field" class="search_label"></label>
        <input type="text" id="search_field" class="pointer" placeholder="search a pokemon">
    </div>

    <div class="content_wrapper">
      <div id="content" class="pokemon_content">
        </div>
    </div>
    <dialog id="pokeDialog">
        <div id="dialog_wrapper" onclick="clickOutsidePokeCard(event)">
            <p>
                Pokemon Dialog Placeholder
                Hier stehen Infos zum Pokemon.
            </p>
        </div>
    </dialog>
    <button onclick="getPokemon(loadMore=true)" class="pointer load_More">load more</button>
</body>
<script src="scripts/script2.js"></script>
<script src="scripts/template.js"></script>
<script src="scripts/dialog.js"></script>
</html>
